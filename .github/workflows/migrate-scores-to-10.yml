name: Migrate candidate scores to 10

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/migrate-scores-to-10.yml
      - migrate_scores_to_10.mjs
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/migrate-scores-to-10.yml
      - migrate_scores_to_10.mjs

permissions:
  contents: write
  pull-requests: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase Admin dependencies
        run: npm --prefix functions ci

      - name: Write service account key
        shell: bash
        run: |
          cat > /tmp/sa-key.json <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF

      - name: Convert stored candidate scores from 5 to 10
        id: migration
        shell: bash
        run: |
          set +e
          node migrate_scores_to_10.mjs > /tmp/score-migration-full.log 2>&1
          code=$?

          if [ "$code" -eq 0 ]; then
            {
              echo "Candidate score migration verification"
              echo "Run: ${GITHUB_RUN_ID}"
              echo "Commit: ${GITHUB_SHA}"
              grep -E '^(Candidates:|Campaigns:|Done\.)' /tmp/score-migration-full.log
            } > /tmp/score-migration-summary.txt
          else
            {
              echo "Candidate score migration failed with exit code ${code}."
              grep -Ei '(error|failed|credential|permission|denied|invalid|not found|project)' /tmp/score-migration-full.log | tail -n 20
            } > /tmp/score-migration-summary.txt
          fi

          cat /tmp/score-migration-summary.txt
          cp /tmp/score-migration-summary.txt score-migration-status.txt
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
          GOOGLE_CLOUD_PROJECT: insight-recruiting-d37dc
          GCLOUD_PROJECT: insight-recruiting-d37dc

      - name: Report verification result on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = '/tmp/score-migration-summary.txt'
            const summary = fs.existsSync(path)
              ? fs.readFileSync(path, 'utf8').trim()
              : 'The migration step did not produce a summary.'
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Candidate score migration verification\n\n\`\`\`text\n${summary.slice(0, 4000)}\n\`\`\``
            })

      - name: Commit non-sensitive migration status
        if: steps.migration.outputs.exit_code == '0' && github.event_name != 'pull_request'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add score-migration-status.txt
          if git diff --cached --quiet; then
            echo "Migration status is unchanged."
          else
            git commit -m "Record candidate score migration status [skip ci]"
            git push
          fi

      - name: Fail when migration did not complete
        if: steps.migration.outputs.exit_code != '0'
        run: exit 1
