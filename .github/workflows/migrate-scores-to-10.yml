name: Migrate candidate scores to 10

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/migrate-scores-to-10.yml
      - migrate_scores_to_10.mjs
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/migrate-scores-to-10.yml
      - migrate_scores_to_10.mjs

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase Admin dependencies
        run: npm --prefix functions ci

      - name: Write service account key
        shell: bash
        run: |
          cat > /tmp/sa-key.json <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF

      - name: Convert stored candidate scores from 5 to 10
        shell: bash
        run: |
          set -o pipefail
          node migrate_scores_to_10.mjs | tee /tmp/score-migration-full.log
          {
            echo "Candidate score migration verification"
            echo "Run: ${GITHUB_RUN_ID}"
            echo "Commit: ${GITHUB_SHA}"
            grep -E '^(Candidates:|Campaigns:|Done\.)' /tmp/score-migration-full.log
          } > score-migration-status.txt
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json

      - name: Commit non-sensitive migration status
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add score-migration-status.txt
          if git diff --cached --quiet; then
            echo "Migration status is unchanged."
          else
            git commit -m "Record candidate score migration status [skip ci]"
            git push
          fi
