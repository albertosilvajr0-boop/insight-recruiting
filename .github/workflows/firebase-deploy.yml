name: Build and Deploy to Firebase

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Audit high-risk dependencies
        run: npm run audit:high

      - name: Build frontend
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Audit high-risk dependencies
        run: npm run audit:high

      - name: Build frontend
        run: npm run build

      # The applyPage function serves the SPA shell with JobPosting JSON-LD
      # injected — bundle the freshly built index.html so asset hashes match.
      - name: Copy app shell into functions
        run: cp dist/index.html functions/apply-shell.html

      - name: Write service account key
        run: |
          cat > /tmp/sa-key.json <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF

      # Single deploy call for all active targets. Legacy self-scheduling
      # functions are intentionally not listed so deploys do not touch stale
      # Cloud Scheduler or availability resources.
      - name: Deploy to Firebase (hosting, firestore, storage, functions)
        run: |
          npx firebase-tools deploy \
            --only "hosting,firestore,storage,functions:onCandidateCreated,functions:onCandidateUpdated,functions:dailyDigest,functions:getCandidateStatus,functions:shareCandidate,functions:shareCandidates,functions:followUpShare,functions:getEmployerReview,functions:recordEmployerReviewAction,functions:createCandidateInvite,functions:attachInviteResume,functions:getInviteSession,functions:touchInvitePresence,functions:submitInvitedInterview,functions:reopenInvite,functions:reopenOwnInterview,functions:jobFeed,functions:sitemap,functions:applyPage,functions:trackShare,functions:createUser,functions:ensureCurrentUserProfile,functions:touchAdminPresence,functions:updateUser,functions:deleteUser,functions:scoreCandidate,functions:sendPhoneVerification,functions:verifyPhoneCode" \
            --force \
            --project insight-recruiting-d37dc \
            --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
