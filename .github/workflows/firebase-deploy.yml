name: Build and Deploy to Firebase

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install functions dependencies
        run: cd functions && npm ci

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Write service account key
        run: |
          cat > /tmp/sa-key.json <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF

      # Single deploy call for all targets. Previously this was split across
      # FirebaseExtended/action-hosting-deploy@v0 + two firebase-tools calls,
      # and the third-party action was the source of an intermittent exit-2.
      # Using firebase-tools directly makes failures easier to debug (the
      # specific target that failed shows up in the log) and avoids the
      # rolling @v0 tag as a moving dependency.
      - name: Deploy to Firebase (hosting, firestore, storage, functions)
        run: npx firebase-tools deploy --only hosting,firestore,storage,functions --force --project insight-recruiting-d37dc --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
